# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  cpu: 1
  memoryMiB: 1024
  concurrency: 40
  maxInstances: 10

# Create these with `firebase apphosting:secrets:set`.
# Configure APP_BASE_URL, owner bootstrap values, quota/model allowlist values,
# emergency feature flags, and public NEXT_PUBLIC_FIREBASE_* values for the backend environment.
# Optional managed provider secrets should only be configured when their feature flags,
# quotas, and model allowlists are production-ready.
env:
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
    availability:
      - RUNTIME
  - variable: STRIPE_PRO_PRICE_ID
    secret: STRIPE_PRO_PRICE_ID
    availability:
      - RUNTIME
  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
    availability:
      - RUNTIME
